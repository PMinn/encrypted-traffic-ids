repos:
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        additional_dependencies:
          - tomli # 使用 pyproject.toml
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.3.0
    hooks:
      - id: mypy
        # entry: bash -c 'echo $PWD && mypy "$@"'
        args:
          [
            "--config-file", "pyproject.toml",
            "--python-version=3.10"
          ]
        additional_dependencies:
          [
            numpy==2.2.6,
            scapy==2.6.1,
            tqdm==4.67.1,
            scikit-learn==1.7.2,
            imbalanced-learn==0.14.0,
            pyshark==0.6,
            cryptography==46.0.3,
            einops==0.8.1,
            matplotlib==3.10.7,
            tabulate==0.9.0,
            pre-commit==4.5.0,
            pandas==2.3.3,
            mlflow==3.7.0,

            tqdm-stubs==0.2.1,
            types-tabulate==0.9.0,
            microsoft-python-type-stubs @ git+https://github.com/microsoft/python-type-stubs.git@main,
            pyspark-stubs==3.0.0.post3,
            pandas-stubs==2.3.3.251201,

            torch==2.9.1,
          ]
  - repo: https://github.com/psf/black
    rev: 25.11.0  # 請確認使用最新的版本
    hooks:
      - id: black
        language_version: python3.10.12  # 替換為你的 Python 版本