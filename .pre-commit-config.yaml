repos:
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.3.0
    hooks:
      - id: mypy
        # Optional: Add args to mypy command, e.g., to ignore certain files or follow imports differently
        # args: ["--ignore-missing-imports", "--follow-imports=skip"]
        # entry: mypy --config-file ./pyproject.toml
        args: ["--config-file", "pyproject.toml"]
        additional_dependencies:
          [
            torch,
            numpy==2.2.6,
            scapy==2.6.1,
            tqdm==4.67.1,
            tqdm-stubs==0.2.1,
            scikit-learn==1.7.2,
            imbalanced-learn==0.14.0,
            pyshark==0.6,
            cryptography==46.0.3,
            einops==0.8.1,
            matplotlib==3.10.7,
            tabulate==0.9.0,
            types-tabulate==0.9.0,
            microsoft-python-type-stubs @ git+https://github.com/microsoft/python-type-stubs.git@main,
            pre-commit==4.5.0
          ]
  - repo: https://github.com/psf/black
    rev: 25.11.0  # 請確認使用最新的版本
    hooks:
    - id: black
      language_version: python3.10.12  # 替換為你的 Python 版本